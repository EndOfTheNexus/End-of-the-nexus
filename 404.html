<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <meta http-equiv="refresh" content="0; url=./index.html">
    <title>End of the Nexus</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(160deg, #090d18 0%, #121c30 45%, #170d24 100%);
            color: #eff3ff;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        }

        .card {
            width: min(520px, calc(100vw - 32px));
            padding: 28px;
            border-radius: 24px;
            background: rgba(10, 16, 30, 0.92);
            border: 1px solid rgba(130, 173, 255, 0.22);
            text-align: center;
        }

        a {
            color: #ffd36b;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>End of the Nexus</h1>
        <p>Sending you back to the main game page.</p>
        <p><a href="./index.html">Open the game</a></p>
    </div>
</body>
</html>
